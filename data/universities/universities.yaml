# University Collection Configuration
# Add target universities and their programs here

version: 1

defaults:
  language: de
  crawl_interval_days: 7
  depth: medium          # shallow | medium | deep
  focus_areas:
    - industrial design
    - product design
    - art
    - design

crawl_settings:
  respect_robots_txt: true
  delay_between_requests_ms: 2000
  max_pages_per_session: 50
  user_agent: "UniResearchBot/1.0 (Academic Research)"

universities:
  # === MVP Target ===
