# University Collection Configuration
# Add target universities and their programs here

version: 1

defaults:
  language: de
  crawl_interval_days: 7
  depth: medium          # shallow | medium | deep
  focus_areas:
    - industrial design
    - product design
    - art
    - design

crawl_settings:
  respect_robots_txt: true
  delay_between_requests_ms: 2000
  max_pages_per_session: 50
  user_agent: "UniResearchBot/1.0 (Academic Research)"

universities:
  # === MVP Target ===
  - slug: bauhaus-universitaet-weimar
    name_en: Bauhaus-Universitat Weimar
    name_de: Bauhaus-Universitat Weimar
    url: https://www.uni-weimar.de
    country: de
    city: Weimar
    state: Thuringia
    type: universitaet
    focus: true
    programs:
      - slug: product-design
        name_en: Product Design (Industrial Design)
        name_de: Produktdesign
        url: https://www.uni-weimar.de/en/architecture-and-urbanism/chairs/product-design/
        degree: ma
        focus: true
        start_urls:
          - url: https://www.uni-weimar.de/en/architecture-and-urbanism/chairs/product-design/
            type: program_overview
          - url: https://www.uni-weimar.de/en/architecture-and-urbanism/chairs/
            type: faculty_list
          - url: https://www.uni-weimar.de/en/study/degree-programs/
            type: program_list
        link_patterns:
          - pattern: "/en/architecture-and-urbanism/chairs/product-design/"
            follow: true
          - pattern: "/en/architecture-and-urbanism/people/"
            type: person_page

